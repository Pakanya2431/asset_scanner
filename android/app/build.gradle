plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

dependencies {
    implementation fileTree(dir: 'libs', include: ['*.jar'])
    implementation 'androidx.lifecycle:lifecycle-runtime:2.7.0'
    implementation 'androidx.lifecycle:lifecycle-process:2.7.0'
    implementation 'androidx.lifecycle:lifecycle-common:2.7.0'
}

android {
    namespace "com.example.asset_scanner"
    compileSdk 35
    ndkVersion flutter.ndkVersion
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
    kotlinOptions {
        jvmTarget = "1.8"
    }
    sourceSets {
        main {
            java {
                srcDirs = ['src/main/java', 'src/main/kotlin']
            }
        }
    }
    configurations.all {
        resolutionStrategy.force 'androidx.lifecycle:lifecycle-runtime:2.7.0'
        resolutionStrategy.force 'androidx.lifecycle:lifecycle-common:2.7.0'
        resolutionStrategy.force 'androidx.lifecycle:lifecycle-process:2.7.0'
    }
    defaultConfig {
        applicationId "com.example.asset_scanner"
        minSdk 21
        targetSdk flutter.targetSdkVersion
        versionCode flutter.versionCode
        versionName flutter.versionName
    }
    buildTypes {
        release {
            signingConfig signingConfigs.debug
            minifyEnabled false
            shrinkResources false
        }
    }
}

flutter {
    source "../.."
}
